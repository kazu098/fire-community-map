<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIRE研究所 コミュニティマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif; }

    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: white;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    #header h1 {
      font-size: 15px;
      font-weight: bold;
      color: #1f2937;
    }
    #member-count { display: none; }

    #map {
      position: fixed;
      top: 52px; left: 0; right: 0; bottom: 0;
    }

    /* ---- Balloon marker ---- */
    .balloon {
      width: 28px;
      height: 36px;
      position: relative;
    }
    .balloon-body {
      width: 28px;
      height: 28px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: #3b82f6;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .balloon-body::after {
      content: '';
      width: 10px;
      height: 10px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      position: absolute;
      top: 4px;
      left: 4px;
    }

    /* ---- Popup ---- */
    .leaflet-popup-content { margin: 8px 12px; }
    .popup-public {
      font-size: 13px;
      color: #374151;
      white-space: nowrap;
    }
    .popup-public .pref-label {
      font-weight: bold;
      color: #1f2937;
    }
  </style>
</head>
<body>

<div id="header">
  <h1>🗾 FIRE研究所 コミュニティマップ</h1>
  <span id="member-count"></span>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SUPABASE_URL = 'https://hchlqnsretsbhumeojdk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjaGxxbnNyZXRzYmh1bWVvamRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NDAxNjcsImV4cCI6MjA5ODAxNjE2N30.iy0Fg7izs1DKonTGcMuORCiWilCujVfd3b_dwUlYyLM';

const map = L.map('map', { zoomControl: true }).setView([36.5, 136.0], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 18,
}).addTo(map);

const balloonIcon = L.divIcon({
  html: '<div class="balloon"><div class="balloon-body"></div></div>',
  className: '',
  iconSize: [28, 36],
  iconAnchor: [14, 36],
  popupAnchor: [0, -36],
});

async function loadMembers() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/member_locations?select=prefecture,municipality_optional,map_lat,map_lng&map_lat=not.is.null`,
    { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
  );
  const members = await res.json();

  members.forEach(m => {
    const popup = document.createElement('div');
    popup.className = 'popup-public';
    const label = document.createElement('span');
    label.className = 'pref-label';
    label.textContent = [m.prefecture, m.municipality_optional].filter(Boolean).join(' ');
    popup.appendChild(label);

    L.marker([m.map_lat, m.map_lng], { icon: balloonIcon })
      .bindPopup(popup)
      .addTo(map);
  });

  document.getElementById('member-count').textContent = `メンバー ${members.length} 人`;
}

loadMembers();
</script>
</body>
</html>
